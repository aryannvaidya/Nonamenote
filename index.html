<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NoNameNote | Anonymous Telegraph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Special+Elite&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  </head>
  <body style="background-color: #0a0a0a; margin: 0;">
    <!-- Branded Splash Screen (visible during initial bundle load) -->
    <div id="app-loader" style="position: fixed; inset: 0; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; font-family: 'Crimson Pro', serif;">
      <div style="width: 80px; height: 80px; margin-bottom: 2rem; opacity: 0; animation: fadeInScale 0.8s forwards ease-out;">
        <img src="/logo.webp" alt="" style="width: 100%; height: 100%; object-fit: contain;" onerror="this.style.display='none'; if(this.nextElementSibling) this.nextElementSibling.style.display='block';">
        <div style="display: none; width: 100%; height: 100%; border: 1px dashed rgba(184, 158, 122, 0.4); border-radius: 50%; position: relative;">
           <div style="position: absolute; top:50%; left:50%; transform: translate(-50%, -50%); color: #b89e7a; font-size: 24px; font-weight: 300;">N³</div>
        </div>
      </div>
      <div style="color: #b89e7a; letter-spacing: 0.5em; text-transform: uppercase; font-size: 12px; font-weight: 400; opacity: 0; animation: fadeIn 1s 0.3s forwards ease-out;">
        Initializing Secure Channel
      </div>
      <div id="loader-bar" style="width: 120px; height: 1px; background: rgba(184, 158, 122, 0.1); margin-top: 1.5rem; position: relative; overflow: hidden;">
        <div style="position: absolute; top: 0; left: 0; height: 100%; width: 50%; background: #b89e7a; animation: scan 1.5s infinite linear;"></div>
      </div>
      <style>
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 0.5; } }
        @keyframes scan { from { left: -50%; } to { left: 100%; } }
      </style>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Clean up loader when application is ready
      window.addEventListener('load', () => {
        const loader = document.getElementById('app-loader');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.5s ease-out';
          setTimeout(() => loader.remove(), 500);
        }
      });
    </script>
  </body>
</html>
